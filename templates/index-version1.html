<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Symptom Diagnosis Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 span.icon { font-size: 1.5rem; }

    .disclaimer-banner {
      background: #fff3cd;
      border-bottom: 1px solid #ffc107;
      padding: 8px 24px;
      font-size: 0.78rem;
      color: #856404;
      text-align: center;
    }

    .disclaimer-banner strong { color: #664d03; }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
    }

    .message {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .message.bot .avatar  { background: #1a73e8; color: white; }
    .message.user .avatar { background: #34a853; color: white; }

    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.6;
      font-size: 0.92rem;
    }

    .message.bot .bubble {
      background: white;
      border-top-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      color: #202124;
    }

    .message.user .bubble {
      background: #1a73e8;
      color: white;
      border-top-right-radius: 4px;
    }

    /* Formatted sections in bot messages */
    .bubble .section-label {
      font-weight: 700;
      color: #1a73e8;
      margin-top: 10px;
      margin-bottom: 4px;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .bubble .section-label:first-child { margin-top: 0; }

    .bubble ul { padding-left: 18px; margin: 6px 0; }
    .bubble li { margin: 4px 0; }
    .bubble p  { margin: 6px 0; }
    .bubble p:first-child { margin-top: 0; }
    .bubble p:last-child  { margin-bottom: 0; }

    .severity-mild     { color: #34a853; font-weight: 600; }
    .severity-moderate { color: #fbbc04; font-weight: 600; }
    .severity-serious  { color: #ea4335; font-weight: 600; }

    .typing-indicator {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 10px 14px;
    }

    .typing-indicator span {
      width: 8px; height: 8px;
      background: #9aa0a6;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-6px); }
    }

    .input-area {
      background: white;
      border-top: 1px solid #e0e0e0;
      padding: 14px 16px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      max-width: 860px;
      margin: 0 auto;
    }

    #messageInput {
      flex: 1;
      border: 1.5px solid #dadce0;
      border-radius: 24px;
      padding: 10px 18px;
      font-size: 0.95rem;
      outline: none;
      resize: none;
      font-family: inherit;
      line-height: 1.4;
      max-height: 120px;
      overflow-y: auto;
      transition: border-color 0.2s;
    }

    #messageInput:focus { border-color: #1a73e8; }

    #sendBtn {
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    #sendBtn:hover   { background: #1557b0; }
    #sendBtn:active  { transform: scale(0.95); }
    #sendBtn:disabled{ background: #9aa0a6; cursor: not-allowed; }

    .reset-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.5);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.82rem;
      transition: background 0.2s;
    }

    .reset-btn:hover { background: rgba(255,255,255,0.15); }

    .turn-badge {
      text-align: center;
      font-size: 0.72rem;
      color: #9aa0a6;
      margin: -4px 0;
    }

    .disclaimer-footer {
      font-size: 0.72rem;
      color: #9aa0a6;
      text-align: center;
      padding: 4px 0 2px;
    }
  </style>
</head>
<body>

<header>
  <h1><span class="icon">🩺</span> Symptom Diagnosis Assistant</h1>
  <button class="reset-btn" onclick="resetChat()">↺ New Session</button>
</header>

<div class="disclaimer-banner">
  <strong>⚠ Medical Disclaimer:</strong> This tool is for <strong>informational purposes only</strong>
  and does not replace professional medical advice. In emergencies, call <strong>911</strong>.
</div>

<div class="chat-container" id="chatContainer"></div>

<div class="input-area">
  <div class="input-row">
    <textarea id="messageInput" placeholder="Describe your symptoms..." rows="1"
              onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="sendBtn" onclick="sendMessage()" title="Send">&#10148;</button>
  </div>
  <p class="disclaimer-footer">AI-generated analysis — always consult a qualified healthcare provider.</p>
</div>

<script>
  let isLoading = false;
  let turnCount = 0;

  // Auto-start: load greeting on page load
  window.addEventListener('load', () => {
    initGreeting();
  });

  async function initGreeting() {
    showTyping();
    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ message: '__INIT__' })
      });
      const data = await res.json();
      removeTyping();
      if (data.response) appendMessage('bot', data.response, data.turn);
    } catch (e) {
      removeTyping();
      appendMessage('bot', 'Hello! I\'m your symptom analysis assistant. Please describe your main symptom or health concern, and I\'ll help you understand what might be going on.', 0);
    }
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  async function sendMessage() {
    const input = document.getElementById('messageInput');
    const msg = input.value.trim();
    if (!msg || isLoading) return;

    input.value = '';
    input.style.height = 'auto';
    appendMessage('user', msg);
    setLoading(true);
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ message: msg })
      });
      const data = await res.json();
      removeTyping();
      if (data.error) {
        appendMessage('bot', '⚠ Error: ' + data.error);
      } else {
        appendMessage('bot', data.response, data.turn);
      }
    } catch (err) {
      removeTyping();
      appendMessage('bot', '⚠ Connection error. Please try again.');
    } finally {
      setLoading(false);
    }
  }

  function formatBotMessage(text) {
    // Replace section headers (Reasoning:, Possible Conditions:, etc.)
    let html = text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>');

    // Section headers
    html = html.replace(/^(Reasoning:|Possible Conditions:|Recommended Action:|Differential Diagnosis:|Summary:|Note:|Red Flags:|Follow-up Questions?:)/gm,
      '<div class="section-label">$1</div>');

    // Severity coloring
    html = html.replace(/\b(mild)\b/gi, '<span class="severity-mild">$1</span>');
    html = html.replace(/\b(moderate)\b/gi, '<span class="severity-moderate">$1</span>');
    html = html.replace(/\b(serious|severe|urgent|emergency)\b/gi, '<span class="severity-serious">$1</span>');

    // Bullet lists
    const lines = html.split('\n');
    let inList = false;
    const processed = [];
    for (const line of lines) {
      const trimmed = line.trim();
      if (trimmed.startsWith('- ') || trimmed.startsWith('• ') || /^\d+\.\s/.test(trimmed)) {
        if (!inList) { processed.push('<ul>'); inList = true; }
        processed.push('<li>' + trimmed.replace(/^[-•]\s+/, '').replace(/^\d+\.\s+/, '') + '</li>');
      } else {
        if (inList) { processed.push('</ul>'); inList = false; }
        if (trimmed) processed.push('<p>' + trimmed + '</p>');
      }
    }
    if (inList) processed.push('</ul>');
    return processed.join('');
  }

  function appendMessage(role, text, turn) {
    const container = document.getElementById('chatContainer');

    if (role === 'bot' && turn && turnCount < turn) {
      turnCount = turn;
      const badge = document.createElement('div');
      badge.className = 'turn-badge';
      badge.textContent = `— Turn ${turn} —`;
      container.appendChild(badge);
    }

    const msgDiv = document.createElement('div');
    msgDiv.className = 'message ' + role;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'bot' ? '🩺' : '👤';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (role === 'bot') {
      bubble.innerHTML = formatBotMessage(text);
    } else {
      bubble.textContent = text;
    }

    msgDiv.appendChild(avatar);
    msgDiv.appendChild(bubble);
    container.appendChild(msgDiv);
    container.scrollTop = container.scrollHeight;
  }

  function showTyping() {
    const container = document.getElementById('chatContainer');
    const indicator = document.createElement('div');
    indicator.className = 'message bot';
    indicator.id = 'typingIndicator';
    indicator.innerHTML = `
      <div class="avatar">🩺</div>
      <div class="bubble">
        <div class="typing-indicator">
          <span></span><span></span><span></span>
        </div>
      </div>`;
    container.appendChild(indicator);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  function setLoading(state) {
    isLoading = state;
    document.getElementById('sendBtn').disabled = state;
    document.getElementById('messageInput').disabled = state;
  }

  async function resetChat() {
    if (!confirm('Start a new session? Current conversation will be cleared.')) return;
    await fetch('/reset', { method: 'POST' });
    document.getElementById('chatContainer').innerHTML = '';
    turnCount = 0;
    initGreeting();
  }
</script>
</body>
</html>
